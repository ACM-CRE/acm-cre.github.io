<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% assign lang = page.lang | default: site.lang | default: "en" %}
{% assign strings = site.data.strings[lang] %}

<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.config.site.event_name }}</title>

<!-- Google Fonts: Outfit -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<!-- Compiled CSS (Bootstrap + custom) -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- SEO -->
{% seo %}

<!-- Noindex for disabled feature pages -->
{% if page.feature and site.features[page.feature] == false %}
<meta name="robots" content="noindex, nofollow">
{% endif %}

<!-- Schema.org Event structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": "{{ site.data.config.site.event_name }}",
  "description": "{{ site.data.config.site.tagline }}",
  "startDate": "{{ site.data.config.site.date }}",
  "endDate": "{{ site.data.config.site.date }}",
  "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
  "eventStatus": "https://schema.org/EventScheduled",
  "location": {
    "@type": "Place",
    "name": "{{ site.data.config.site.location.name }}",
    "address": "{{ site.data.config.site.location.address }}"
  },
  "organizer": {
    "@type": "Organization",
    "name": "ACM COMPUTE Regional",
    "url": "{{ site.url }}{{ site.baseurl }}"
  },
  "image": "{{ site.data.config.site.hero_image | prepend: site.baseurl | prepend: site.url }}"
}
</script>
