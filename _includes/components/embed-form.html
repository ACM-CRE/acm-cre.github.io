{% assign lang = page.lang | default: site.lang | default: "en" %}
{% assign strings = site.data.strings[lang] %}

<div class="embed-form">
  <iframe
    src="{{ include.url }}"
    title="{{ strings.register.heading }}"
    loading="lazy"
    allowfullscreen>
    <p>{{ strings.register.embed_fallback }}</p>
  </iframe>
</div>

<p class="mt-3 text-center text-muted">
  {{ strings.register.instructions }}
  <a href="{{ include.url }}" target="_blank" rel="noopener noreferrer">
    {{ include.url }}
  </a>
</p>
